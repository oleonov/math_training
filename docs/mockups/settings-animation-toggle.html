<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>Настройки тренировки - анимации</title>
  <style>
    :root {
      --ink: #1f2d3d;
      --muted: #6b7c8f;
      --brand: #2f6df6;
      --brand-strong: #1d4ed8;
      --brand-soft: #e6efff;
      --card: #ffffff;
      --page: #f4f8ff;
      --ring: rgba(31, 45, 61, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: Nunito, ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(60rem 60rem at 110% -10%, rgba(220, 235, 255, 0.8), transparent 55%),
        radial-gradient(55rem 55rem at -10% 110%, rgba(205, 234, 253, 0.8), transparent 55%),
        radial-gradient(45rem 45rem at 50% 120%, rgba(255, 230, 239, 0.8), transparent 50%),
        var(--page);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 30px 46px;
    }

    .card {
      width: min(100%, 1154px);
      min-height: 1126px;
      padding: 74px 72px 72px;
      border-radius: 58px;
      background: var(--card);
      box-shadow: 0 30px 64px rgba(47, 109, 246, 0.1);
      outline: 1px solid rgba(31, 45, 61, 0.08);
    }

    h1 {
      margin: 0;
      font-family: Fredoka, Nunito, ui-rounded, system-ui, sans-serif;
      font-size: 74px;
      font-weight: 400;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .lead {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 32px;
      line-height: 1.3;
    }

    .groups {
      display: grid;
      gap: 58px;
      margin-top: 68px;
    }

    fieldset {
      margin: 0;
      padding: 0;
      border: 0;
    }

    legend {
      margin: 0 0 28px;
      padding: 0;
      font-size: 40px;
      font-weight: 800;
      line-height: 1.1;
    }

    .choices {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .chip {
      min-width: 136px;
      height: 120px;
      border: 0;
      border-radius: 34px;
      color: var(--brand-strong);
      background: var(--brand-soft);
      font: inherit;
      font-size: 40px;
      font-weight: 800;
      line-height: 1;
    }

    .chip.wide {
      min-width: 180px;
    }

    .chip.xwide {
      min-width: 204px;
    }

    .chip.selected {
      color: #fff;
      background: var(--brand);
      box-shadow: 0 14px 28px rgba(47, 109, 246, 0.26);
    }

    .unit {
      margin-left: 8px;
      font-size: 28px;
      font-weight: 700;
      opacity: 0.8;
    }

    .animation-row {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      margin-top: 32px;
      color: var(--ink);
      font-size: 31px;
      font-weight: 800;
      line-height: 1.2;
      user-select: none;
    }

    .checkbox {
      display: grid;
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 10px;
      background: var(--brand);
      box-shadow: 0 8px 16px rgba(47, 109, 246, 0.24);
    }

    .checkbox svg {
      width: 25px;
      height: 25px;
      color: #fff;
      stroke-width: 4;
    }

    .start {
      width: 100%;
      height: 128px;
      margin-top: 58px;
      border: 0;
      border-radius: 32px;
      color: #fff;
      background: var(--brand);
      box-shadow: 0 16px 26px rgba(47, 109, 246, 0.26);
      font-family: Fredoka, Nunito, ui-rounded, system-ui, sans-serif;
      font-size: 50px;
      font-weight: 400;
      letter-spacing: 0;
    }

    @media (max-width: 760px) {
      .page {
        padding: 18px;
      }

      .card {
        min-height: auto;
        padding: 34px 24px 26px;
        border-radius: 34px;
      }

      h1 {
        font-size: 40px;
      }

      .lead {
        font-size: 20px;
      }

      .groups {
        gap: 34px;
        margin-top: 42px;
      }

      legend {
        margin-bottom: 16px;
        font-size: 26px;
      }

      .choices {
        gap: 12px;
      }

      .chip,
      .chip.wide,
      .chip.xwide {
        min-width: 92px;
        height: 76px;
        border-radius: 22px;
        font-size: 28px;
      }

      .unit {
        margin-left: 4px;
        font-size: 19px;
      }

      .animation-row {
        gap: 12px;
        margin-top: 28px;
        font-size: 22px;
      }

      .checkbox {
        width: 30px;
        height: 30px;
        border-radius: 8px;
      }

      .checkbox svg {
        width: 20px;
        height: 20px;
      }

      .start {
        height: 82px;
        margin-top: 48px;
        border-radius: 24px;
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-label="Настройки тренировки">
      <h1>Настройки тренировки</h1>
      <p class="lead">Выбери, как тренируемся сегодня.</p>

      <div class="groups">
        <fieldset>
          <legend>Таймер на ответ</legend>
          <div class="choices" aria-label="Таймер на ответ">
            <button class="chip" type="button">2<span class="unit">с</span></button>
            <button class="chip" type="button">3<span class="unit">с</span></button>
            <button class="chip selected" type="button">4<span class="unit">с</span></button>
            <button class="chip" type="button">5<span class="unit">с</span></button>
            <button class="chip" type="button">8<span class="unit">с</span></button>
          </div>
        </fieldset>

        <fieldset>
          <legend>Время тренировки</legend>
          <div class="choices" aria-label="Время тренировки">
            <button class="chip wide" type="button">1<span class="unit">мин</span></button>
            <button class="chip wide" type="button">2<span class="unit">мин</span></button>
            <button class="chip wide" type="button">3<span class="unit">мин</span></button>
            <button class="chip wide selected" type="button">5<span class="unit">мин</span></button>
            <button class="chip xwide" type="button">10<span class="unit">мин</span></button>
            <button class="chip xwide" type="button">15<span class="unit">мин</span></button>
          </div>

          <label class="animation-row">
            <span class="checkbox" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12.5l4.2 4.2L19 7" />
              </svg>
            </span>
            <span>Включить анимации</span>
          </label>
        </fieldset>
      </div>

      <button class="start" type="button">Начать тренировку</button>
    </section>
  </main>
</body>
</html>
