<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Демо: фейерверк и конфетти на экране результатов</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1f2d3d;
    --muted: #6b7c8f;
    --brand: #2f6df6;
    --brand-strong: #1d4ed8;
    --brand-soft: #e6efff;
    --correct: #16a34a;
    --slow: #f59e0b;
    --wrong: #ef4444;
    --card: #ffffff;
    --font-display: "Fredoka", system-ui, sans-serif;
    --font-body: "Nunito", system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body { min-height: 100dvh; margin: 0; }

  body {
    font-family: var(--font-body);
    color: var(--ink);
    background-color: #f4f8ff;
    background-image:
      radial-gradient(60rem 60rem at 110% -10%, #dcebffcc 0%, transparent 55%),
      radial-gradient(55rem 55rem at -10% 110%, #cdeafdcc 0%, transparent 55%),
      radial-gradient(45rem 45rem at 50% 120%, #ffe6efcc 0%, transparent 50%);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    padding: 24px 16px 140px;
  }

  /* ---- "Ночное" затемнение (только под фейерверк) ---- */
  #scrim {
    position: fixed;
    inset: 0;
    z-index: 40;
    pointer-events: none;
    background: radial-gradient(120% 100% at 50% 0%, #0b1230 0%, #05070f 100%);
    opacity: 0;
    transition: opacity 600ms ease;
  }
  #scrim.on { opacity: 0.82; }

  /* ---- Холст эффектов ---- */
  #fx {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
  }

  /* ---- Экран результатов (копия SummaryScreen) ---- */
  .stage {
    position: relative;
    z-index: 45;
    margin: 0 auto;
    width: 100%;
    max-width: 42rem;
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: filter 600ms ease;
  }
  .night .stage { filter: drop-shadow(0 20px 50px rgba(0,0,0,0.55)); }

  .hero {
    border-radius: 2rem;
    background: var(--card);
    padding: 36px 28px;
    text-align: center;
    box-shadow: 0 25px 50px -12px rgba(47,109,246,0.18);
    box-shadow: 0 25px 50px -12px rgba(47,109,246,0.18), 0 0 0 1px rgba(0,0,0,0.05);
  }
  .hero h1 { font-family: var(--font-display); font-size: 2.25rem; margin: 0; color: var(--ink); }
  .hero .sub { margin: 6px 0 0; color: var(--muted); }
  .big {
    font-family: var(--font-display);
    font-size: 4.5rem;
    line-height: 1.05;
    color: var(--brand-strong);
    margin: 8px 0;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
    padding: 8px 16px;
    border-radius: 999px;
    background: linear-gradient(135deg, #ffd700, #f59e0b);
    color: #5b3b00;
    font-family: var(--font-display);
    font-size: 1.05rem;
    font-weight: 700;
    box-shadow: 0 10px 22px -8px rgba(245,158,11,0.7);
    opacity: 0;
    transform: scale(0.6) translateY(8px);
  }
  .badge.show {
    animation: badgePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, badgeFloat 2.6s ease-in-out 0.5s infinite;
  }
  @keyframes badgePop { to { opacity: 1; transform: scale(1) translateY(0); } }
  @keyframes badgeFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  .badge .old { font-weight: 600; opacity: 0.75; }

  .stats {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  @media (max-width: 520px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat {
    border-radius: 1rem;
    background: #fff;
    padding: 16px;
    text-align: center;
    box-shadow: 0 1px 0 rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.05);
  }
  .stat .v { font-family: var(--font-display); font-size: 1.875rem; }
  .stat .l { margin-top: 2px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }

  .lists { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 520px) { .lists { grid-template-columns: 1fr; } }
  .list { border-radius: 1rem; background: #fff; padding: 20px; box-shadow: 0 0 0 1px rgba(0,0,0,0.05); }
  .list h3 { margin: 0 0 12px; color: var(--ink); font-weight: 800; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 4px 0; }
  .row .q { font-family: var(--font-display); font-size: 1.25rem; color: var(--ink); }
  .row .m { font-size: 0.9rem; font-weight: 700; color: var(--muted); }

  .again {
    width: 100%;
    border: 0;
    border-radius: 1rem;
    background: var(--brand);
    color: #fff;
    padding: 16px;
    font-family: var(--font-display);
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 18px 30px -12px rgba(47,109,246,0.6);
    transition: background 0.15s, transform 0.1s;
  }
  .again:hover { background: var(--brand-strong); }
  .again:active { transform: scale(0.98); }

  /* ---- Панель управления демо ---- */
  .panel {
    position: fixed;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    z-index: 60;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 12px;
    border-radius: 1.25rem;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(12px);
    box-shadow: 0 12px 30px -10px rgba(31,45,61,0.35), 0 0 0 1px rgba(0,0,0,0.06);
    max-width: calc(100% - 24px);
  }
  .panel .title {
    width: 100%;
    text-align: center;
    font-family: var(--font-display);
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .panel button {
    border: 0;
    border-radius: 0.85rem;
    padding: 10px 14px;
    font-family: var(--font-body);
    font-weight: 800;
    font-size: 0.95rem;
    cursor: pointer;
    background: var(--brand-soft);
    color: var(--brand-strong);
    transition: transform 0.1s, background 0.15s, color 0.15s;
  }
  .panel button:hover { background: #d6e6ff; }
  .panel button:active { transform: scale(0.95); }
  .panel button.primary { background: var(--brand); color: #fff; }
  .panel button.primary:hover { background: var(--brand-strong); }
  .panel button.toggle.on { background: #1f2d3d; color: #fff; }
</style>
</head>
<body>
  <div id="scrim"></div>
  <canvas id="fx"></canvas>

  <!-- Экран результатов: точная копия SummaryScreen для контекста -->
  <div class="stage" id="stage">
    <div class="hero">
      <h1>Готово! 🎉</h1>
      <p class="sub">Средний балл за тренировку</p>
      <div class="big">86%</div>
      <div class="badge" id="badge">🏆 Новый рекорд! <span class="old">было 79%</span></div>
      <div class="stats">
        <div class="stat"><div class="v" style="color:var(--ink)">24</div><div class="l">Всего</div></div>
        <div class="stat"><div class="v" style="color:var(--correct)">18</div><div class="l">Быстрых</div></div>
        <div class="stat"><div class="v" style="color:var(--slow)">4</div><div class="l">Медленных</div></div>
        <div class="stat"><div class="v" style="color:var(--wrong)">2</div><div class="l">Ошибок</div></div>
      </div>
    </div>
    <div class="lists">
      <div class="list">
        <h3>Самые слабые карточки</h3>
        <div class="row"><span class="q">7 × 8 = 56</span><span class="m">42%</span></div>
        <div class="row"><span class="q">6 × 9 = 54</span><span class="m">55%</span></div>
        <div class="row"><span class="q">8 × 9 = 72</span><span class="m">61%</span></div>
      </div>
      <div class="list">
        <h3>Давно не повторяли</h3>
        <div class="row"><span class="q">3 × 4 = 12</span><span class="m">5 дн. назад</span></div>
        <div class="row"><span class="q">2 × 7 = 14</span><span class="m">3 дн. назад</span></div>
        <div class="row"><span class="q">4 × 6 = 24</span><span class="m">сегодня</span></div>
      </div>
    </div>
    <button class="again">Ещё раз</button>
  </div>

  <!-- Панель управления демо (в реальном приложении её не будет) -->
  <div class="panel">
    <div class="title">Демо-режим — выбери эффект 👇</div>
    <button id="b-confetti">🎊 Конфетти-залп</button>
    <button id="b-fireworks">🎆 Фейерверки</button>
    <button id="b-combo" class="primary">🌟 Большой праздник</button>
    <button id="b-night" class="toggle">🌙 Затемнение</button>
  </div>

<script>
(() => {
  "use strict";
  const canvas = document.getElementById("fx");
  const ctx = canvas.getContext("2d");
  const scrim = document.getElementById("scrim");
  const badge = document.getElementById("badge");

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener("resize", resize);
  resize();

  const COLORS = ["#2f6df6", "#16a34a", "#f59e0b", "#ef4444", "#ffd700", "#ff7eb6", "#a855f7", "#22d3ee"];
  const rand = (a, b) => a + Math.random() * (b - a);
  const pick = (arr) => arr[(Math.random() * arr.length) | 0];

  const confetti = [];  // плоские бумажки (падают сверху)
  const sparks = [];    // искры фейерверка
  const rockets = [];    // взлетающие ракеты

  // --- Конфетти ---
  function confettiBurst(x, y, count, angleDeg, spreadDeg, power) {
    for (let i = 0; i < count; i++) {
      const a = (angleDeg + rand(-spreadDeg, spreadDeg)) * Math.PI / 180;
      const v = power * rand(0.45, 1);
      confetti.push({
        x, y,
        vx: Math.cos(a) * v,
        vy: Math.sin(a) * v,
        g: 0.16,
        drag: 0.986,
        w: rand(6, 11),
        h: rand(9, 15),
        color: pick(COLORS),
        rot: rand(0, Math.PI * 2),
        vr: rand(-0.22, 0.22),
        tilt: rand(0, Math.PI * 2),
        vtilt: rand(0.06, 0.13),
        life: 1,
        fade: rand(0.004, 0.0075),
        round: Math.random() < 0.22,
      });
    }
  }

  function confettiCannons() {
    // два «пушечных» залпа из нижних углов — стиль canvas-confetti
    confettiBurst(0, H, 70, -65, 28, 17);
    confettiBurst(W, H, 70, -115, 28, 17);
    setTimeout(() => {
      confettiBurst(0, H, 45, -60, 30, 15);
      confettiBurst(W, H, 45, -120, 30, 15);
    }, 220);
  }

  // --- Фейерверки ---
  function launchRocket(targetX, targetY, color) {
    rockets.push({
      x: targetX, y: H + 6,
      vx: rand(-0.5, 0.5),
      vy: -Math.sqrt(2 * 0.07 * (H - targetY)) , // ровно долетит до targetY
      g: 0.07,
      color,
      trail: [],
    });
  }

  function explode(x, y, color) {
    const n = (rand(50, 90)) | 0;
    const multi = Math.random() < 0.4;
    const ringSpeed = rand(3.2, 6);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2 + rand(-0.04, 0.04);
      const v = ringSpeed * rand(0.55, 1);
      sparks.push({
        x, y,
        vx: Math.cos(a) * v,
        vy: Math.sin(a) * v,
        g: 0.045,
        drag: 0.965,
        color: multi ? pick(COLORS) : color,
        life: 1,
        fade: rand(0.012, 0.02),
        size: rand(1.6, 3.1),
      });
    }
    // яркая вспышка-сердцевина
    for (let i = 0; i < 14; i++) {
      const a = Math.random() * Math.PI * 2;
      const v = rand(0.4, 1.8);
      sparks.push({ x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v, g: 0.02, drag: 0.95, color: "#ffffff", life: 1, fade: rand(0.03,0.05), size: rand(2,3.4) });
    }
  }

  let fireworksTimer = null;
  function fireworksShow(durationMs) {
    let fired = 0;
    const fireOne = () => {
      const tx = rand(W * 0.15, W * 0.85);
      const ty = rand(H * 0.12, H * 0.45);
      launchRocket(tx, ty, pick(COLORS));
    };
    fireOne();
    clearInterval(fireworksTimer);
    fireworksTimer = setInterval(() => {
      fireOne();
      if (Math.random() < 0.35) setTimeout(fireOne, 120);
      fired++;
    }, 480);
    setTimeout(() => clearInterval(fireworksTimer), durationMs);
  }

  // --- Рендер-цикл ---
  function frame() {
    ctx.clearRect(0, 0, W, H);

    // ракеты
    ctx.globalCompositeOperation = "lighter";
    for (let i = rockets.length - 1; i >= 0; i--) {
      const r = rockets[i];
      r.vy += r.g;
      r.x += r.vx;
      r.y += r.vy;
      r.trail.push({ x: r.x, y: r.y });
      if (r.trail.length > 8) r.trail.shift();
      for (let t = 0; t < r.trail.length; t++) {
        const p = r.trail[t];
        ctx.globalAlpha = (t / r.trail.length) * 0.8;
        ctx.fillStyle = r.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.2, 0, Math.PI * 2);
        ctx.fill();
      }
      if (r.vy >= -0.4) {
        explode(r.x, r.y, r.color);
        rockets.splice(i, 1);
      }
    }

    // искры (свечение)
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.vx *= s.drag;
      s.vy = s.vy * s.drag + s.g;
      s.x += s.vx;
      s.y += s.vy;
      s.life -= s.fade;
      if (s.life <= 0) { sparks.splice(i, 1); continue; }
      ctx.globalAlpha = Math.max(0, s.life);
      ctx.shadowColor = s.color;
      ctx.shadowBlur = 12;
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = "source-over";

    // конфетти (плоские бумажки)
    for (let i = confetti.length - 1; i >= 0; i--) {
      const c = confetti[i];
      c.vx *= c.drag;
      c.vy = c.vy * c.drag + c.g;
      c.x += c.vx;
      c.y += c.vy;
      c.rot += c.vr;
      c.tilt += c.vtilt;
      c.life -= c.fade;
      if (c.life <= 0 || c.y > H + 40) { confetti.splice(i, 1); continue; }
      const sway = Math.cos(c.tilt) * (c.w * 0.5);
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.rot);
      ctx.globalAlpha = Math.max(0, Math.min(1, c.life * 1.5));
      ctx.fillStyle = c.color;
      if (c.round) {
        ctx.beginPath();
        ctx.ellipse(0, 0, c.w * 0.45, c.h * 0.45, 0, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // покачивание: ширина "дышит" по tilt — эффект объёма
        ctx.fillRect(-Math.abs(sway) * 0.5, -c.h / 2, Math.max(1.5, Math.abs(sway)), c.h);
      }
      ctx.restore();
    }
    ctx.globalAlpha = 1;

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // --- Управление ---
  function showBadge() {
    badge.classList.remove("show");
    void badge.offsetWidth; // restart animation
    badge.classList.add("show");
  }

  let nightOn = false;
  function setNight(on) {
    nightOn = on;
    scrim.classList.toggle("on", on);
    document.body.classList.toggle("night", on);
    document.getElementById("b-night").classList.toggle("on", on);
  }

  document.getElementById("b-confetti").onclick = () => { confettiCannons(); showBadge(); };
  document.getElementById("b-fireworks").onclick = () => { fireworksShow(4500); showBadge(); };
  document.getElementById("b-combo").onclick = () => {
    showBadge();
    confettiCannons();
    fireworksShow(5200);
    setTimeout(() => { confettiBurst(W / 2, -10, 80, 90, 55, 9); }, 600);  // дождь сверху
    setTimeout(() => confettiCannons(), 2600);
  };
  document.getElementById("b-night").onclick = () => setNight(!nightOn);

  // Автозапуск «большого праздника» при открытии
  setTimeout(() => document.getElementById("b-combo").click(), 500);
})();
</script>
</body>
</html>
