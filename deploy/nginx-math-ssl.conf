# Phase 2: HTTPS vhost for math.pandorika-it.com (after the cert is issued).
# Replaces the phase-1 file; redirects HTTP -> HTTPS and proxies to the app.
server {
    # Bind the public IP explicitly to match the other vhosts on this box.
    listen 46.101.75.18:80;
    server_name math.pandorika-it.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 46.101.75.18:443 ssl http2;
    server_name math.pandorika-it.com;

    ssl_certificate     /etc/letsencrypt/live/math.pandorika-it.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/math.pandorika-it.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
