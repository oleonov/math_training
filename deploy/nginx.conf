# nginx reverse proxy for math.pandorika-it.com -> Next.js on 127.0.0.1:3000.
# Install: cp deploy/nginx.conf /etc/nginx/sites-available/math.pandorika-it.com
#          ln -s ../sites-available/math.pandorika-it.com /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
# `certbot --nginx -d math.pandorika-it.com` will inject the TLS (443) block and
# an HTTP->HTTPS redirect automatically.
server {
    listen 80;
    listen [::]:80;
    server_name math.pandorika-it.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
