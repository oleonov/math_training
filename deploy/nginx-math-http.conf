# Phase 1: HTTP-only vhost for math.pandorika-it.com.
# Serves the ACME challenge (for the first certificate) and proxies to the app.
# Drop in as /etc/nginx/conf.d/math.pandorika-it.com.conf, then `nginx -t && reload`.
server {
    # Bind the public IP explicitly: the other vhosts on this box use
    # `listen 46.101.75.18:80`, and nginx routes connections to that IP to the
    # IP-specific socket. A generic `listen 80` would never see them.
    listen 46.101.75.18:80;
    server_name math.pandorika-it.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
